name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "gati_route_manager/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    env:
      ANDROID_HOME: ${{ github.workspace }}/gati_route_manager/.buildozer/android/platform/android-sdk

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autoconf automake build-essential ccache cmake curl \
            git libffi-dev libltdl-dev libssl-dev libtool \
            ninja-build openjdk-17-jdk python3-pip unzip zip zlib1g-dev
        shell: bash

      - name: Cache Buildozer (Android SDK/NDK)
        uses: actions/cache@v5
        with:
          path: |
            ~/.buildozer
            gati_route_manager/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('gati_route_manager/buildozer.spec') }}

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip buildozer cython setuptools
        shell: bash

      - name: Update SDK and accept licenses
        run: |
          cd gati_route_manager
          buildozer android update || true
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          if [ -d "$SDK_DIR/cmdline-tools/latest/bin" ]; then
            yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1
          elif [ -d "$SDK_DIR/tools/bin" ]; then
            yes | $SDK_DIR/tools/bin/sdkmanager --licenses 2>&1
          fi
        shell: bash

      - name: Build APK with Buildozer
        run: |
          cd gati_route_manager
          buildozer android debug 2>&1
        shell: bash

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: GATI-Route-Manager-APK
          path: gati_route_manager/bin/*.apk
          if-no-files-found: error
